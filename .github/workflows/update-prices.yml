name: Update Amazon prices

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # GitHub 排程可能延遲，因此每 30 分鐘檢查一次；只有資料落後於最近目標時段才真正擷取。
    # UTC 01:07–11:37 = 台灣平日 09:07–19:37。
    - cron: '7,37 1-11 * * 1-5'
    # 台灣週末只檢查早晚兩個目標時段。
    - cron: '7,37 1,11 * * 0,6'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ipaw-price-pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Check whether new price data is needed
        id: freshness
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SITE_DATA_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest-run.json
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          payload="$(curl -fsSL --max-time 20 "$SITE_DATA_URL" 2>/dev/null || true)"
          finished_at="$(printf '%s' "$payload" | jq -r '.run.finishedAt // empty' 2>/dev/null || true)"
          finished_epoch="$(date -u -d "$finished_at" +%s 2>/dev/null || echo 0)"
          expected_epoch="$(node --input-type=module -e "import { latestExpectedRunAt } from './src/schedule.js'; console.log(Math.floor(latestExpectedRunAt(new Date()).getTime() / 1000))")"

          if (( finished_epoch >= expected_epoch )); then
            echo "最近目標時段已有成功資料，本次只檢查、不重抓 Amazon。"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "資料落後於最近目標時段，啟動補抓。"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
        if: steps.freshness.outputs.should_run == 'true'
      - uses: actions/cache@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        if: steps.freshness.outputs.should_run == 'true'
      - name: Scrape 12 Amazon ASINs
        if: steps.freshness.outputs.should_run == 'true'
        shell: bash
        run: |
          attempt=1
          until npm run static:scrape; do
            if (( attempt >= 2 )); then
              echo "兩次擷取皆失敗。" >&2
              exit 1
            fi
            echo "::warning::第一次擷取失敗，20 秒後自動重試。"
            attempt=$((attempt + 1))
            sleep 20
          done
        env:
          AMAZON_ZIP: '10001'
      - name: Build GitHub Pages site
        if: steps.freshness.outputs.should_run == 'true'
        run: npm run build
        env:
          VITE_STATIC_MODE: 'true'
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ACTIONS_URL: https://github.com/${{ github.repository }}/actions/workflows/update-prices.yml
      - uses: actions/configure-pages@v5
        if: steps.freshness.outputs.should_run == 'true'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          path: dist
      - name: Deploy GitHub Pages
        if: steps.freshness.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
