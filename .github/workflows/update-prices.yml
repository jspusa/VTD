name: Update Amazon prices

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 正式排程：台灣時間週一至週五 09:27、11:27、13:27、15:27、17:27、19:27
    - cron: '27 9,11,13,15,17,19 * * 1-5'
      timezone: 'Asia/Taipei'
    # 正式排程：台灣時間週六、週日 09:27、19:27
    - cron: '27 9,19 * * 0,6'
      timezone: 'Asia/Taipei'
    # 備援排程：若同一時段已有新資料，只檢查、不重抓 Amazon
    - cron: '47 9,11,13,15,17,19 * * 1-5'
      timezone: 'Asia/Taipei'
    - cron: '47 9,19 * * 0,6'
      timezone: 'Asia/Taipei'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ipaw-price-pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check whether the backup run is needed
        id: freshness
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule || '' }}
          SITE_DATA_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest-run.json
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" != "schedule" || "$EVENT_SCHEDULE" != 47\ * ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          payload="$(curl -fsSL --max-time 20 "$SITE_DATA_URL" 2>/dev/null || true)"
          finished_at="$(printf '%s' "$payload" | jq -r '.run.finishedAt // empty' 2>/dev/null || true)"
          finished_epoch="$(date -u -d "$finished_at" +%s 2>/dev/null || echo 0)"
          now_epoch="$(date -u +%s)"
          age_seconds=$((now_epoch - finished_epoch))

          if (( finished_epoch > 0 && age_seconds >= 0 && age_seconds < 2400 )); then
            echo "最近 40 分鐘內已有成功資料，備援排程不重抓 Amazon。"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "未找到本時段的新資料，啟動備援擷取。"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.freshness.outputs.should_run == 'true'
      - uses: actions/setup-node@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
        if: steps.freshness.outputs.should_run == 'true'
      - uses: actions/cache@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
        if: steps.freshness.outputs.should_run == 'true'
      - name: Scrape 12 Amazon ASINs
        if: steps.freshness.outputs.should_run == 'true'
        shell: bash
        run: |
          attempt=1
          until npm run static:scrape; do
            if (( attempt >= 2 )); then
              echo "兩次擷取皆失敗。" >&2
              exit 1
            fi
            echo "::warning::第一次擷取失敗，20 秒後自動重試。"
            attempt=$((attempt + 1))
            sleep 20
          done
        env:
          AMAZON_ZIP: '10001'
      - name: Build GitHub Pages site
        if: steps.freshness.outputs.should_run == 'true'
        run: npm run build
        env:
          VITE_STATIC_MODE: 'true'
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ACTIONS_URL: https://github.com/${{ github.repository }}/actions/workflows/update-prices.yml
      - uses: actions/configure-pages@v5
        if: steps.freshness.outputs.should_run == 'true'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        if: steps.freshness.outputs.should_run == 'true'
        with:
          path: dist
      - name: Deploy GitHub Pages
        if: steps.freshness.outputs.should_run == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
