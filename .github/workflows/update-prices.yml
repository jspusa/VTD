name: Update Amazon prices

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 台灣時間週一至週五 09:10、11:10、13:10、15:10、17:10、19:10（UTC+8）
    - cron: '10 1,3,5,7,9,11 * * 1-5'
    # 台灣時間週六、週日 09:10、19:10（UTC+8）
    - cron: '10 1,11 * * 0,6'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ipaw-price-pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Scrape 12 Amazon ASINs
        run: npm run static:scrape
        env:
          AMAZON_ZIP: '10001'
      - name: Build GitHub Pages site
        run: npm run build
        env:
          VITE_STATIC_MODE: 'true'
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ACTIONS_URL: https://github.com/${{ github.repository }}/actions/workflows/update-prices.yml
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
